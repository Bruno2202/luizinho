<div class="flex flex-col p-8 h-screen bg-slate-50 gap-8 overflow-auto w-full">
    <div class="border-b border-slate-200 pb-4">
        <h1 class="font-bold text-3xl text-slate-800 tracking-tight">Cadastros</h1>
        <p class="text-slate-500 text-sm">Gerencie seus registros e configurações</p>
    </div>

    <div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-6">
        @for (item of menuItens; track item.label) {
        <a [routerLink]="item.path" 
           class="group relative flex flex-col justify-between overflow-hidden rounded-2xl bg-white p-6 
                  shadow-sm border border-slate-100 transition-all duration-300 
                  hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-500/10 hover:border-blue-200">
            
            <div class="absolute inset-0 bg-linear-to-br from-blue-50/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

            <div class="relative z-10">
                <div class="mb-4 inline-flex items-center justify-center rounded-lg bg-blue-50 p-3 text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                    <lucide-angular [img]="item.icon" class="size-6" />
                </div>
                
                <h2 class="text-xl font-bold text-slate-800 group-hover:text-blue-700 transition-colors">
                    {{item.label}}
                </h2>
                <p class="text-sm text-slate-500 mt-1">Acessar módulo de {{item.label}}</p>
            </div>

            <div class="relative z-10 mt-8 flex items-center justify-end">
                <div class="flex items-center text-sm font-medium text-blue-600 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                    Abrir
                    <lucide-angular [img]="ChevronRight" class="ml-1 size-5" />
                </div>
            </div>
        </a>
        }
    </div>
</div>
