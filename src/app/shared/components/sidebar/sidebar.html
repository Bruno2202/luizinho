<aside class="flex h-screen w-full flex-col border-r border-slate-200 bg-white py-4 px-2 transition-all">
    <div class="mb-10 flex items-center justify-center px-2">
        <a routerLink="home" class="transition-transform hover:scale-105 active:scale-95">
            <img class="w-24 object-contain" src="images/luizinho_sistemas.png" alt="Logo" />
        </a>
    </div>

    <nav class="flex flex-col gap-1.5">
        @for (item of menuItems; track item.label) {
        <a [routerLink]="item.path" 
           routerLinkActive="bg-blue-50 text-blue-700 !border-blue-200 shadow-sm shadow-blue-50"
           class="group flex items-center justify-between rounded-xl border border-transparent p-3 text-slate-600 transition-all duration-200 hover:bg-slate-50 hover:text-blue-600">
            
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center transition-colors group-hover:text-blue-600">
                    <lucide-angular [img]="item.icon" class="size-5 shrink-0" strokeWidth="2.25"></lucide-angular>
                </div>
                
                <span class="text-sm font-semibold tracking-tight">{{ item.label }}</span>
            </div>

            <lucide-angular 
                [img]="ChevronRight" 
                class="size-4 opacity-0 -translate-x-2 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 group-[.bg-blue-50]:opacity-100 group-[.bg-blue-50]:translate-x-0">
            </lucide-angular>
        </a>
        }
    </nav>

    <div class="mt-auto pt-6 border-t border-slate-100">
        <button class="flex w-full items-center gap-3 rounded-xl p-3 text-sm font-medium text-slate-500 hover:bg-red-50 hover:text-red-600 transition-colors">
            <lucide-angular [img]="LogOut" class="size-5"></lucide-angular>
            Sair do Sistema
        </button>
    </div>
</aside>
